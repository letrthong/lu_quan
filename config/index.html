    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS -->

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
    <!-- Leaflet MarkerCluster Plugin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Be+Vietnam+Pro:wght@400;700;900&display=swap');
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        body { 
            font-family: 'Be Vietnam Pro', 'Inter', sans-serif; 
            overscroll-behavior-y: contain;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        .bg-moss { background-color: #36453b; }
        .text-moss { color: #36453b; }
        .bg-earth { background-color: #c2410c; }
        .border-earth { border-color: #c2410c; }
        /* Custom Map Picker Styles */
        .map-picker-grid {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Safe area handling for modern mobile screens */
        .pb-safe {
            padding-bottom: max(env(safe-area-inset-bottom), 0.5rem);
        }
        .pt-safe {
            padding-top: max(env(safe-area-inset-top), 0.5rem);
        }
    </style>
