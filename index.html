<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lữ Quán - Kết Nối Du Lịch</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
    <!-- Leaflet MarkerCluster Plugin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Be+Vietnam+Pro:wght@400;700;900&display=swap');
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        body { 
            font-family: 'Be Vietnam Pro', 'Inter', sans-serif; 
            overscroll-behavior-y: contain;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        
        .bg-moss { background-color: #36453b; }
        .text-moss { color: #36453b; }
        .bg-earth { background-color: #c2410c; }
        .border-earth { border-color: #c2410c; }
        
        /* Custom Map Picker Styles */
        .map-picker-grid {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Safe area handling for modern mobile screens */
        .pb-safe {
            padding-bottom: max(env(safe-area-inset-bottom), 0.5rem);
        }
        .pt-safe {
            padding-top: max(env(safe-area-inset-top), 0.5rem);
        }
    </style>
</head>
<body class="bg-stone-50 overflow-hidden m-0 p-0">
    <div id="root">
        <!-- Màn hình chờ (Loading) -->
        <div class="fixed inset-0 bg-stone-50 flex flex-col items-center justify-center z-[9999]">
            <div class="relative w-20 h-20 mb-6">
                <div class="absolute inset-0 border-4 border-stone-200 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-orange-600 rounded-full border-t-transparent animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center text-orange-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
            </div>
            <h2 class="text-stone-800 font-black text-xl uppercase tracking-widest mb-2">Lữ Quán</h2>
            <p class="text-stone-500 text-xs font-bold uppercase tracking-widest animate-pulse">Đang tải ứng dụng...</p>
        </div>
    </div>

    <!-- Mount standard Vite ES Module entrypoint -->
    <script type="module" src="js/hotel_connect.js"></script>
</body>
</html>
